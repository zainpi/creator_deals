# Creators Deal Finder configuration
# Fill in credentials and tokens where marked. The app loads this at startup
# and /api/config updates it on save from the dashboard.

# Per‑marketplace Amazon Creators credentials
affiliate_ids:
  FR: pulsedeals0a-21
  DE: pulse08-21
  IT: pulse0d8b-21
  ES: pulsedeals07-21
  GB: pulsedeals04-21
  UK: pulsedeals04-21
  NL: pulse046-21
  BE: pulse0dc-21

# AI scoring — 0-100 scale (discount quality, popularity, brand, resale
# potential, overall attractiveness). A deal needs >= minimum_score to be
# posted to Discord.
ai:
  minimum_score: 50
  enabled: true

# Discord webhooks. `webhook_url` is the default/global feed used by
# scheduler.py + continuous_scanner.py. `method_webhooks` route the Method 1
# vs Method 2 comparison engine (method_scanner.py) by Keepa drop % (90d, or
# 30d fallback when no 90d data):
#   drop >= 90%  -> tier90   (#method-uno-90 / #method-dos-90)
#   drop >= 70%  -> tier70   (#method-uno-70 / #method-dos-70)
#   drop >= 50%  -> tier50   (#method-uno-50 / #method-dos-50)
#   drop < 50%   -> trash    (below the lowest % tier; `rest` channels unused)
#   Keepa/AI rejects -> trash (#trash-method-1 / #trash-method-2)
# Paste each channel's webhook URL below (channel settings -> Integrations ->
# Webhooks), or set env vars DISCORD_WEBHOOK_METHOD{1,2}_{90,70,50,REST,TRASH}
# instead (env vars win if both are set — see config_loader.py).
discord:
  webhook_url: YOUR_WEBHOOK
  method_webhooks:
    method1:
      tier90: PASTE_METHOD_UNO_90_WEBHOOK_URL_HERE
      tier70: PASTE_METHOD_UNO_70_WEBHOOK_URL_HERE
      tier50: PASTE_METHOD_UNO_50_WEBHOOK_URL_HERE
      rest: PASTE_METHOD_UNO_REST_WEBHOOK_URL_HERE
      trash: PASTE_TRASH_METHOD_1_WEBHOOK_URL_HERE
    method2:
      tier90: PASTE_METHOD_DOS_90_WEBHOOK_URL_HERE
      tier70: PASTE_METHOD_DOS_70_WEBHOOK_URL_HERE
      tier50: PASTE_METHOD_DOS_50_WEBHOOK_URL_HERE
      rest: PASTE_METHOD_DOS_REST_WEBHOOK_URL_HERE
      trash: PASTE_TRASH_METHOD_2_WEBHOOK_URL_HERE

# Amazon search defaults
amazon:
  marketplace: DE           # Default marketplace when testing
  min_saving_percent: 50    # Filter threshold
  max_price: 450            # Euros
  sort_by: Featured         # Creators API sort key
  keywords: clothes         # Comma/space-separated keywords
  # Optional: restrict fulfillment (leave empty to omit)
  # delivery_flags: ""      # e.g. PRIME, Fulfilled, AmazonGlobal (catalog enum)

# Creators API options
creators:
  basic_mode: false          # Lenient mode (shows more results)
  partner_tag: ""           # Optional override (otherwise derived from affiliate_ids)



# Server-side filters used by scheduler
filters:
  blocked_categories:
    - Grocery
    - Books
    - Audible
    - PrimeVideo
    - GiftCards
  min_keepa_drop_percent: 0
  min_rating: 0
  min_review_count: 0
  apply_to_new: false       # When true, apply filters to new discoveries before saving/posting

# Keepa configuration
keepa:
  enabled: false

# Scanner/runtime
scanner:
  creators_batch_delay: 1.5
  keepa_batch_size: 100
  max_parallel_requests: 5
  pages_to_search: 5                  # max page per (index, keyword) combo
  scan_interval_seconds: 15           # delay between scan ticks (worker loop)
  cooldown_hours: 48                  # don't re-Keepa the same ASIN within this window
  min_api_saving_percent: 20          # only pull listings already >= this % off list price
  marketplaces: [DE, GB, FR, ES, IT]  # marketplaces the continuous scanner rotates through
  sort_rotation: [Featured, "Price:LowToHigh", NewestArrivals]

# Category-aware pricing brain for the continuous scanner.
# The Keepa euro-off threshold scales with each category's learned typical price.
pricing:
  # An item is kept if EITHER it's a big absolute euro drop OR a strong relative % drop.
  min_drop_percent: 20          # category-relative path: >= this % below the 90-day avg
  min_euro_off_default: 50      # absolute path / cold-start top-tier euro floor (electronics)
  min_euro_off_floor: 8         # cheapest categories never require less than this
  euro_off_pct_of_typical: 0.15 # scaled euro threshold = typical_avg90 * this (clamped to floor..default)
  min_baseline_samples: 3       # Keepa samples before a category is considered "learned"
  worth_keepa_factor: 0.6       # (legacy) pre-filter tightness; pre-filter now just checks below-typical

# Seller rules
seller:
  allow_amazon_only: false
  min_feedback_percent: 90

# Method 1 vs Method 2 comparison engine (method_scanner.py, runs in worker.py
# alongside the scanner above — separate mode, does not replace it).
# Categories/methods are switched on/off at runtime from the "Pick a Category"
# panel in the dashboard (persisted in the method_nodes table); this section
# only sets the engine's fixed parameters.
method_test:
  auto_start: true               # start the engine enabled on worker boot (runs continuously; dashboard can still pause it)
  marketplace: DE                # browse node IDs are currently DE-only
  max_price: 450                 # € sweep ceiling per node before wrapping to 0
  keepa_drop_percent: 30         # flat threshold: reject unless price is >= this % below the Keepa avg (90d, or 30d fallback)
  tick_seconds: 110              # delay between round-robin ticks; 86400/110 ≈ 785 ticks × 10 pages max ≈ 7850 calls/day, keeps worst case ~9% under the 8640 budget
  daily_budget_requests: 8640    # Creator API basic-plan TPD budget (10 ASINs/call); engine pauses once reached, resumes next day
